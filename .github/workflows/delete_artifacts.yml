name: Bulk Delete Old Artifacts

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday
  workflow_dispatch: # Allows you to manually trigger it for testing

jobs:
  clean-old-artifacts:
    runs-on: ubuntu-latest
    permissions:
      actions: write  # Critical permission to allow deletion

    steps:
      - name: Delete Artifacts Older Than 3 Days
        uses: actions/github-script@v7
        with:
          script: |
            // 1. Fetch the last 100 artifacts from the repository
            const response = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            // 2. Define the age cutoff (3 days ago)
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 3); 
            
            console.log(`Checking ${response.data.artifacts.length} total artifacts...`);
            let deletedCount = 0;

            // 3. Loop through and delete matching items
            for (const artifact of response.data.artifacts) {
              const artifactDate = new Date(artifact.created_at);
              
              if (artifactDate < cutoffDate) {
                console.log(`Deleting expired artifact: "${artifact.name}" (Created: ${artifact.created_at})`);
                
                try {
                  await github.rest.actions.deleteArtifact({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    artifact_id: artifact.id
                  });
                  deletedCount++;
                } catch (err) {
                  console.log(`Skipped "${artifact.name}": Already cleared by GitHub or pending metadata removal.`);
                }
              }
            }
            console.log(`Done! Successfully purged ${deletedCount} old artifacts.`);
