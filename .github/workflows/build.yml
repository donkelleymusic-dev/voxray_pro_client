name: Build Flutter APK

on:
  #push:
    #branches: [ main ] # Triggers the build whenever you push to main
  workflow_dispatch: # Allows you to trigger the build manually
  
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --target-platform android-arm64 --obfuscate --split-debug-info=build/app/outputs/symbols
        #run: flutter build apk --debug # Debug build bypasses strict Keystore signing

    # 1. NEW: Upload to GitHub Releases instead of Artifacts
      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: always() 
        with:
          tag_name: build-${{ github.run_number }}
          name: "Dev Build #${{ github.run_number }}"
          prerelease: true
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
      # 2. UPDATED: Point the summary link to the Releases page
      - name: Display Clickable Link
        if: always()
        run: |
          echo "### 📱 Download Your Build Directly" >> $GITHUB_STEP_SUMMARY
          echo "Click here to download your compiled app: [Download Mobile APK](https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY
    
      # 3. UNCHANGED: Telegram upload works exactly as before
      - name: Send APK to Telegram
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "New dev build ready! Download here: https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_number }}"
          document: build/app/outputs/flutter-apk/app-release.apk



