name: Build and Deploy Voxray

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # 1. Build App Bundle (.aab) for Google Play
      - name: Build Android App Bundle (.aab)
        run: flutter build appbundle --obfuscate --split-debug-info=build/app/outputs/symbols

      # 2. Build APK for direct download via Releases & Telegram
      - name: Build APK
        run: flutter build apk --target-platform android-arm64 --obfuscate --split-debug-info=build/app/outputs/symbols

      # 3. NEW: Upload directly to Google Play Store (Beta Track)
      #- name: Deploy to Google Play Beta
      #  uses: r0adkll/upload-google-play@v1
      #  with:
      #    serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
      #    packageName: com.donkelleymusic.voxray_pro_client # ⚠️ Replace with your exact Android package name
      #    releaseFiles: build/app/outputs/bundle/release/app-release.aab
      #    track: beta
      #    status: completed

      # 4. Upload BOTH the APK and AAB to GitHub Releases (bypassing artifact storage)
      #- name: Upload to GitHub Releases
      #  uses: softprops/action-gh-release@v2
      #  if: always() 
      #  with:
      #    tag_name: build-${{ github.run_number }}
      #    name: "Voxray Build #${{ github.run_number }}"
      #    prerelease: true
      #    files: |
      #      build/app/outputs/flutter-apk/app-release.apk
      #      build/app/outputs/bundle/release/app-release.aab
      #  env:
      #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Display Clickable Link in GitHub Action Summary
      - name: Display Clickable Link
        if: always()
        run: |
          echo "### 📱 Download Your Build Directly" >> $GITHUB_STEP_SUMMARY
          echo "Click here to download your compiled app: [Download Mobile APK](https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_number }})" >> $GITHUB_STEP_SUMMARY

      # 6. Telegram Notification
      - name: Send APK to Telegram
        continue-on-error: true
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: "New Voxray build deployed to Play Store Beta! Download direct APK here: https://github.com/${{ github.repository }}/releases/tag/build-${{ github.run_number }}"
          document: build/app/outputs/flutter-apk/app-release.apk
